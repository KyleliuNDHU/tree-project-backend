services:
  - type: web
    name: tree-app-backend-prod
    env: node
    rootDir: ./
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "node app.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tree-database-prod
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: Claude_API_KEY
        sync: false
      - key: SiliconFlow_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.1
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
  # ML Service 已改為自架 (self-hosted on local machine + ngrok)
  # 設定值透過 ML_SERVICE_URL / ML_API_KEY 環境變數提供給 backend
  # backend 會在登入時將 ML config 傳給前端 App

databases:
  - name: tree-database-prod
    databaseName: tree_data_prod
    plan: Basic-256mb
