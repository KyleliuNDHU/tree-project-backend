services:
  - type: web
    name: tree-app-backend-prod
    region: singapore
    env: node
    rootDir: ./
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "node app.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tree-database-prod
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: Claude_API_KEY
        sync: false
      - key: SiliconFlow_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.1
  - type: web
    name: tree-app-backend-staging
    region: singapore
    env: node
    rootDir: ./
    plan: free
    branch: develop
    buildCommand: "./build.sh"
    startCommand: "node app.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tree-database-staging
          property: connectionString
      - key: NODE_ENV
        value: staging
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: Claude_API_KEY
        sync: false
      - key: SiliconFlow_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.1

databases:
  - name: tree-database-prod
    region: singapore
    databaseName: tree_data_prod
    plan: Basic-256mb
  - name: tree-database-staging
    region: singapore
    databaseName: tree_data_staging
    plan: free
