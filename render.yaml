services:
  - type: web
    name: tree-app-backend
    env: node
    rootDir: ./
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "node app.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tree-database
          property: connectionString
      - key: NODE_VERSION
        value: 20.11.1

databases:
  - name: tree-database
    databaseName: tree_data
    plan: free
