services:
  - type: web
    name: tree-app-backend-prod
    env: node
    rootDir: ./
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "node app.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tree-database-prod
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: Claude_API_KEY
        sync: false
      - key: SiliconFlow_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.1
  # ============================
  # ML Service (Python / FastAPI)
  # ============================
  - type: web
    name: tree-app-ml-service
    env: python
    rootDir: ./ml_service
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt && python -c \"from transformers import AutoImageProcessor, AutoModelForDepthEstimation; AutoImageProcessor.from_pretrained('depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf'); AutoModelForDepthEstimation.from_pretrained('depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf')\""
    startCommand: "gunicorn app:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/src/.hf_cache
      - key: HF_HOME
        value: /opt/render/project/src/.hf_cache

databases:
  - name: tree-database-prod
    databaseName: tree_data_prod
    plan: Basic-256mb
